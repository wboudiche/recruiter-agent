services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: recruiter
      # NOTE: compose reads this from .env. Required (no default) so a
      # forgotten .env fails loudly instead of silently using `recruiter`.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — see .env.example}
      POSTGRES_DB: recruiter
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recruiter -d recruiter"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Built from POSTGRES_PASSWORD so we don't repeat the secret.
      RECRUITER_DATABASE_URL: postgresql+asyncpg://recruiter:${POSTGRES_PASSWORD:?}@postgres:5432/recruiter
      # The Fernet key encrypts every *_enc column in settings (LLM keys,
      # API tokens, LinkedIn cookies, etc.). REQUIRED — `?` makes compose
      # refuse to start if .env is missing it. Generate via:
      #   python -c "import secrets,base64; print(base64.urlsafe_b64encode(secrets.token_bytes(32)).decode())"
      RECRUITER_SETTINGS_KEY: ${RECRUITER_SETTINGS_KEY:?RECRUITER_SETTINGS_KEY is required — see .env.example}
      RECRUITER_RESUME_STORAGE_PATH: /app/var/resumes
      RECRUITER_LOG_LEVEL: INFO
      RECRUITER_OIDC_ISSUER: ""
      # Dev bypass disabled by default in this compose so the seed admin
      # login path is what you actually exercise. Re-enable by setting
      # RECRUITER_DEV_AUTH_BYPASS in a local .env if you want the
      # password-less mode back.
      RECRUITER_DEV_AUTH_BYPASS: ""
      # Seed "default account" — single bootstrap user, only used on the
      # very first start. REQUIRED so no weak default ships in compose.
      RECRUITER_DEFAULT_ACCOUNT_EMAIL: ${RECRUITER_DEFAULT_ACCOUNT_EMAIL:?RECRUITER_DEFAULT_ACCOUNT_EMAIL is required — see .env.example}
      RECRUITER_DEFAULT_ACCOUNT_PASSWORD: ${RECRUITER_DEFAULT_ACCOUNT_PASSWORD:?RECRUITER_DEFAULT_ACCOUNT_PASSWORD is required — see .env.example}
      # Browser hits the same origin (http://localhost:8088); nginx proxies
      # /api to this container. Origin allowlist must include that origin.
      # Comma-separated browser origins allowed to POST to the API (CSRF
      # origin check). Default covers a localhost deploy; override in
      # `.env` when the stack is reachable via a different hostname or
      # remote IP.
      RECRUITER_ALLOWED_ORIGINS: ${RECRUITER_ALLOWED_ORIGINS:-http://localhost:8088}
      RECRUITER_LOCAL_LLM_API_KEY: ${RECRUITER_LOCAL_LLM_API_KEY:-}
      # LinkedIn `li_at` session cookie. When set, LinkedIn URLs are
      # scraped via headless Chromium so the full profile (experience,
      # education, skills) is extracted automatically. Empty (default) →
      # falls back to the GitHub-by-name enricher / manual paste. The
      # cookie belongs to a real LinkedIn account; setting it accepts
      # the ToS + ban-risk implications.
      RECRUITER_LINKEDIN_LI_AT: ${RECRUITER_LINKEDIN_LI_AT:-}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    volumes:
      - resumes:/app/var/resumes
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/docs').status==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: ./recruiter-frontend
      dockerfile: Dockerfile
    ports:
      - "8088:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
  resumes:
