server {
  listen 80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Long cache for fingerprinted assets emitted by vite (filename hashes).
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Proxy API calls to the backend service over the compose network.
  location /api/ {
    proxy_pass http://backend:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # SSE / streaming chat endpoint needs buffering off.
    proxy_buffering off;
    proxy_read_timeout 1h;
  }

  # SPA fallback: everything else hits the same index.html (React Router
  # handles client-side routing).
  location / {
    try_files $uri $uri/ /index.html;
  }
}
