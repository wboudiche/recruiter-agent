name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      # `--extra dev` pulls pytest + pytest-asyncio + testcontainers,
      # which live in [project.optional-dependencies.dev] in pyproject.toml.
      # Without it `uv run pytest` fails with "No such file or directory".
      - name: Install dependencies
        run: uv sync --frozen --extra dev

      # Backend tests use testcontainers to start their own postgres,
      # so the runner just needs Docker — which GitHub Actions provides.
      - name: Run pytest
        run: uv run pytest -q

  frontend:
    name: frontend (vitest + typecheck)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: recruiter-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: recruiter-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Component tests
        run: npm test
